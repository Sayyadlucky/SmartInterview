{% if button_url and button_label %}
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 16px 0;">
  <tr>
    <td align="center" bgcolor="#2563eb" style="border-radius:8px;">
      <a href="{{ button_url }}" style="display:inline-block;padding:14px 22px;font-size:15px;line-height:1.2;font-weight:700;color:#ffffff;text-decoration:none;">
        {{ button_label }}
      </a>
    </td>
  </tr>
</table>
<p style="margin:0 0 24px 0;font-size:12px;line-height:1.7;color:#64748b;word-break:break-all;">
  If the button does not work, copy and paste this link into your browser:<br>
  <a href="{{ button_url }}" style="color:#2563eb;text-decoration:none;">{{ button_url }}</a>
</p>
{% endif %}
