{% if details %}
<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin:0 0 24px 0;">
  <tr>
    <td style="padding:18px 18px 14px 18px;border:1px solid #dbe5f1;border-radius:14px;background-color:#f8fbff;">
      {% if details_title %}
      <p style="margin:0 0 14px 0;font-size:13px;line-height:1.5;color:#475569;font-weight:700;letter-spacing:0.03em;text-transform:uppercase;">
        {{ details_title }}
      </p>
      {% endif %}
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        {% for item in details %}
        <tr>
          <td class="email-row-label" style="padding:0 0 12px 0;font-size:13px;line-height:1.6;color:#64748b;vertical-align:top;">
            {{ item.label }}
          </td>
          <td class="email-row-value" align="right" style="padding:0 0 12px 16px;font-size:14px;line-height:1.6;color:#0f172a;font-weight:700;vertical-align:top;">
            {{ item.value }}
          </td>
        </tr>
        {% endfor %}
      </table>
    </td>
  </tr>
</table>
{% endif %}
