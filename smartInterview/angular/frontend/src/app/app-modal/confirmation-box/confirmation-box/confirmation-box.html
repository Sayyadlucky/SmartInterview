<div class="confirm-shell">
  <button class="close-btn" type="button" (click)="closeDialog()">×</button>

  <div class="head">
    <div class="icon-wrap">
      <i class="ph ph-warning-circle"></i>
    </div>
    <div class="copy">
      <h3>{{ title }}</h3>
      <p>{{ message }}</p>
    </div>
  </div>

  <div class="actions">
    <button type="button" class="btn btn-ghost" (click)="confirmNo()">{{ cancelText }}</button>
    <button type="button" class="btn btn-primary" (click)="confirmYes()">{{ confirmText }}</button>
  </div>
</div>
