<div class="modal-overlay" id="modal">
    <div class="modal-card">
    <button class="modal-close" id="modalClose" (click)="closeDialog()">&times;</button>
    <h4 class="side-title">Confirmation Box</h4>
    <div class="candidate-name" id="modalName">{{ message }}</div>
    <div class="modal-actions flex justify-between pt-2 gap-4">
        <button (click)="confirmYes()"
            class="w-[45%] flex items-center justify-center gap-2 bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-2 px-4 rounded-lg shadow-md transition">
            <i class="ph ph-check"></i> Confirm
        </button>
        <button (click)="confirmNo()"
            class="w-[45%] flex items-center justify-center gap-2 bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-2 px-4 rounded-lg shadow-md transition">
            <i class="ph ph-x"></i> Cancel
        </button>
    </div>
    </div>
</div>
