<div>
  <app-particle-background id="particles"></app-particle-background>
  <router-outlet></router-outlet>
  <div class="idle-warning-overlay" *ngIf="idleWarningOpen">
    <div class="idle-warning-dialog" role="dialog" aria-modal="true" aria-labelledby="idle-warning-title">
      <p class="idle-warning-kicker">Session Expiring</p>
      <h2 id="idle-warning-title">You will be signed out soon.</h2>
      <p class="idle-warning-copy">
        For security, your session ends after 30 minutes of inactivity. Stay signed in to keep working.
      </p>
      <p class="idle-warning-countdown">Signing out in {{ formatIdleCountdown(idleCountdownSeconds) }}</p>
      <div class="idle-warning-actions">
        <button #idleContinueButton type="button" class="idle-warning-primary" (click)="continueSession()" [disabled]="idleContinuePending">
          {{ idleContinuePending ? 'Staying signed in...' : 'Stay Signed In' }}
        </button>
        <button type="button" class="idle-warning-secondary" (click)="logoutNow()">Logout Now</button>
      </div>
    </div>
  </div>
  <app-toast-stack></app-toast-stack>
</div>
